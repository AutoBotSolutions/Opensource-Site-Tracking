<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Page 2 - OpenSite Analytics Demo</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 800px;
            margin: 50px auto;
            padding: 20px;
            line-height: 1.6;
        }
        .button {
            display: inline-block;
            padding: 10px 20px;
            margin: 10px;
            background: #007bff;
            color: white;
            text-decoration: none;
            border-radius: 5px;
        }
        .button:hover {
            background: #0056b3;
        }
    </style>
</head>
<body>
    <h1>Page 2</h1>
    <p>This is the second page. Navigation between pages will be tracked separately.</p>
    
    <a href="index.html" class="button">Back to Home</a>
    
    <!-- OpenSite Analytics Tracking Script -->
    <script>
        (function(w,d,s,id){
            w.OpenSite=w.OpenSite||function(){(w.OpenSite.q=w.OpenSite.q||[]).push(arguments)};
            var f=d.getElementsByTagName(s)[0],
                j=d.createElement(s);
            j.async=true;
            j.src='http://localhost:8000/tracking-script.js';
            j.id=id;
            f.parentNode.insertBefore(j,f);
        })(window,document,'script','opensite-analytics');
        
        // Replace with your actual site key and API key
        OpenSite('init', 'YOUR_SITE_KEY', 'YOUR_API_KEY');
        OpenSite('trackPageview');
    </script>
</body>
</html>
